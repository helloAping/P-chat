<div class="toast" id="toast"></div>

<script>
const API = "";  // same origin
const $ = (id) => document.getElementById(id);

const state = {
    sessions: [],
    currentID: null,
    styles: [],
    providers: [],
    // Global defaults used when creating a new conversation. These
    // are derived from /api/v1/providers at boot (the provider
    // marked `is_default: true` and its `default: true` model)
    // and never change at runtime — they're the "what does a brand
    // new chat use?" answer.
    defaultProvider: null,
    defaultModel: null,
    defaultStyle: "tech",
    // Per-session provider / model / style overrides. Keyed by
    // session id; populated from /api/v1/sessions and /api/v1/
    // sessions/:id responses, and updated on every picker change.
    // Pure runtime cache; NOT persisted to localStorage — the
    // server (conversations.metadata column) is the single source
    // of truth. A page refresh re-hydrates from the next /sessions
    // call.
    sessionMeta: {},
    // Background streams. A stream lives here from "user pressed
    // Enter" to "SSE done or aborted". When the user switches to
    // another session, the stream continues to run in the
    // background and the entry stays in this map until completion.
    // The webview does NOT cancel streams on switch — the server
    // keeps streaming and the assistant message gets persisted to
    // the store; a silent refetch picks it up later.
    streaming: {},
    // Cache of /api/v1/sessions/:id/messages responses keyed by
    // session id. Used to avoid re-fetching when switching back
    // to a session that hasn't changed. Invalidated whenever a
    // background stream finishes for a session the user isn't
    // currently viewing.
    sessionMessages: {},
    // Staged attachments (files the user picked from disk and
    // uploaded to /api/v1/uploads but hasn't sent yet). Each
    // entry is the JSON returned by the upload endpoint:
    // { id, name, size, kind, mime }. Stays in memory only —
    // never persisted to localStorage. Cleared on:
    //   - successful send (chip consumed)
    //   - explicit remove (× on chip)
    //   - session switch (chips belong to the conversation
    //     turn they were staged for, not to the global input).
    // The latter is a deliberate UX choice: switching
    // conversations drops staged work, matching the typical
    // chat-app behaviour.
    pendingAttachments: [],
};

// currentMeta returns the per-session meta for state.currentID,
// filling in the global defaults for any field the server didn't
// record. The result is always a complete {provider, model, style}
// tuple so the picker always has a coherent value to show.
function currentMeta() {
    if (!state.currentID) {
        return { provider: state.defaultProvider, model: state.defaultModel, style: state.defaultStyle };
    }
    const m = state.sessionMeta[state.currentID] || {};
    return {
        provider: m.provider || state.defaultProvider,
        model:    m.model    || state.defaultModel,
        style:    m.style    || state.defaultStyle,
    };
}

// setSessionMeta updates both the in-memory cache and the
// server (fire-and-forget PATCH). Errors are surfaced as a toast
// but never block the picker UI.
function setSessionMeta(id, patch) {
    if (!id) return;
    const cur = state.sessionMeta[id] || {};
    const next = { ...cur, ...patch };
    state.sessionMeta[id] = next;
    // Sync to server. Use raw fetch (not api()) so the streaming
    // SSE connection we hold for this session isn't blocked by
    // the response.
    fetch(`${API}/api/v1/sessions/${encodeURIComponent(id)}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(patch),
    }).then(async (res) => {
        if (!res.ok) {
            const t = await res.text();
            throw new Error(`HTTP ${res.status}: ${t}`);
        }
        // Server may have rewritten the meta (e.g. provider change
        // resets model to provider default). Re-read to stay in sync.
        const updated = await res.json();
        state.sessionMeta[id] = {
            provider: updated.provider,
            model:    updated.model,
            style:    updated.style,
        };
        if (id === state.currentID) {
            renderProviderPicker();
            renderModelPicker();
            renderStylePicker();
        }
    }).catch((e) => {
        toast("同步失败: " + e.message, "error");
    });
}

// ---------- API ----------
async function api(path, opts = {}) {
    const res = await fetch(API + path, opts);
    if (!res.ok) {
        const text = await res.text();
        throw new Error(`HTTP ${res.status}: ${text}`);
    }
    if (res.status === 204) return null;
    const ct = res.headers.get("content-type") || "";
    return ct.includes("json") ? res.json() : res.text();
}

// ---------- Toast ----------
let toastTimer = null;
function toast(msg, type = "info") {
    const el = $("toast");
    el.textContent = msg;
    el.className = "toast show" + (type === "error" ? " error" : "");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = "toast" + (type === "error" ? " error" : ""); }, 2400);
}

// ---------- Styles / providers ----------
async function loadStyles() {
    const r = await api("/api/v1/styles");
    state.styles = r.styles || [];
    renderStylePicker();
}

async function loadProviders() {
    const r = await api("/api/v1/providers");
    state.providers = r.providers || [];
    renderProviderPicker();
    renderModelPicker();
    renderSettingsProviderPicker();
    renderSettingsProviderTable();
    renderSettingsModelTable();
}

function renderStylePicker() {
    const wrap = $("style-picker");
    wrap.innerHTML = "";
    const cur = currentMeta().style;
    for (const s of state.styles) {
        const btn = document.createElement("button");
        btn.className = "style-btn" + (s.id === cur ? " active" : "");
        btn.textContent = s.id;
        btn.title = s.label + " — " + s.desc;
        btn.onclick = () => selectStyle(s.id);
        wrap.appendChild(btn);
    }
}

// renderProviderPicker populates the top-level "Provider"
// dropdown in the sidebar. Reflects the per-session override for
// the current session (or the global default when no session is
// selected).
function renderProviderPicker() {
    const sel = $("provider-picker");
    sel.innerHTML = "";
    if (state.providers.length === 0) {
        const o = document.createElement("option");
        o.textContent = "(未配置提供商)";
        sel.appendChild(o);
        sel.disabled = true;
        return;
    }
    sel.disabled = false;
    const cur = currentMeta().provider;
    for (const p of state.providers) {
        const o = document.createElement("option");
        o.value = p.name;
        o.textContent = p.name + (p.is_default ? "  (默认)" : "");
        if (p.name === cur) o.selected = true;
        sel.appendChild(o);
    }
    sel.onchange = () => onProviderChanged(sel.value);
}

// renderModelPicker populates the second-level "Model" dropdown
// with every model under the currently-selected provider. Selection
// is driven by the per-session meta.
function renderModelPicker() {
    const sel = $("model-picker");
    sel.innerHTML = "";
    const meta = currentMeta();
    const prov = state.providers.find(p => p.name === meta.provider);
    if (!prov) {
        const o = document.createElement("option");
        o.textContent = "(请先选 provider)";
        sel.appendChild(o);
        sel.disabled = true;
        return;
    }
    sel.disabled = false;
    const models = (prov.models && prov.models.length > 0) ? prov.models : [{ name: prov.model }];
    for (const m of models) {
        const o = document.createElement("option");
        o.value = m.name;
        o.textContent = (m.display_name || m.name) + (m.default ? "  (默认)" : "");
        if (m.name === meta.model) o.selected = true;
        sel.appendChild(o);
    }
    sel.onchange = () => selectModel(sel.value);
}

// onProviderChanged runs when the user picks a different
// provider. The model select is rebuilt to show that provider's
// models; if the previous model still exists under the new
// provider, keep it selected, otherwise fall back to the
// provider's default model. The change is also written back to
// the per-session meta on the server (so the picker state is
// preserved across reloads and other tabs).
function onProviderChanged(providerName) {
    const prov = state.providers.find(p => p.name === providerName);
    if (!prov) return;
    const id = state.currentID;
    const cur = id ? (state.sessionMeta[id] || {}) : {};
    const models = (prov.models && prov.models.length > 0) ? prov.models : [{ name: prov.model }];
    const stillExists = models.find(m => m.name === cur.model);
    let newModel = cur.model;
    if (!stillExists) {
        const def = models.find(m => m.default) || models[0];
        newModel = def ? def.name : prov.model;
    }
    renderModelPicker();
    if (id) {
        setSessionMeta(id, { provider: providerName, model: newModel });
    } else {
        // No session yet — bump the global default so the next
        // createSession() picks it up.
        state.defaultProvider = providerName;
        state.defaultModel = newModel;
    }
    toast(`提供商: ${providerName}` + (stillExists ? "" : ` → ${newModel}`));
}

async function selectStyle(id) {
    const cur = currentMeta().style;
    if (id === cur) return;
    if (state.currentID) {
        setSessionMeta(state.currentID, { style: id });
    } else {
        state.defaultStyle = id;
    }
    renderStylePicker();
    toast("风格: " + id);
}

async function selectModel(value) {
    const id = state.currentID;
    const meta = currentMeta();
    if (id) {
        setSessionMeta(id, { model: value });
    } else {
        state.defaultModel = value;
    }
    toast(`模型: ${meta.provider} / ${value}`);
}

// ---------- Settings modal ----------
//
// The settings modal lets the user manage providers and models
// from the web UI:
//
//   - "Models" tab shows a table of all models under the
//     currently-selected provider. Each row has Edit (in-place
//     form for display_name / ctx / out) and Delete buttons;
//     the default model is marked with a pill. Below the table
//     is an "Add model" form.
//
//   - "Provider" tab shows all providers with their protocol,
//     base URL, and an option to set the default.
//
// All writes go through the same JSON HTTP API the CLI uses; on
// success we re-fetch /api/v1/providers to refresh the local
// cache, so the sidebar picker stays in sync without manual
// refresh.

const settingsState = {
    tab: "models",
    activeProvider: null,   // provider currently shown in the models tab
    editingModel: null,     // name of the model being inline-edited, or null
};

function openSettings() {
    if (state.providers.length === 0) {
        toast("尚未配置任何 provider", "error");
        return;
    }
    settingsState.activeProvider = currentMeta().provider || state.providers[0].name;
    settingsState.tab = "models";
    settingsState.editingModel = null;
    $("settings-modal").classList.add("show");
    switchSettingsTab("models");
    renderSettingsProviderPicker();
    renderSettingsProviderTable();
    renderSettingsModelTable();
}

function closeSettings() {
    $("settings-modal").classList.remove("show");
}

function switchSettingsTab(tab) {
    settingsState.tab = tab;
    for (const b of document.querySelectorAll(".settings-tab")) {
        b.classList.toggle("active", b.dataset.tab === tab);
    }
    $("settings-tab-models").style.display = tab === "models" ? "" : "none";
    $("settings-tab-provider").style.display = tab === "provider" ? "" : "none";
}

function renderSettingsProviderPicker() {
    const sel = $("settings-provider-picker");
    sel.innerHTML = "";
    for (const p of state.providers) {
        const o = document.createElement("option");
        o.value = p.name;
        o.textContent = p.name + (p.is_default ? "  (默认)" : "");
        if (p.name === settingsState.activeProvider) o.selected = true;
        sel.appendChild(o);
    }
    sel.onchange = () => {
        settingsState.activeProvider = sel.value;
        settingsState.editingModel = null;
        renderSettingsModelTable();
    };
}

function settingsActiveProvider() {
    return state.providers.find(p => p.name === settingsState.activeProvider) || null;
}

function renderSettingsModelTable() {
    const tbody = $("settings-model-tbody");
    tbody.innerHTML = "";
    const prov = settingsActiveProvider();
    if (!prov) return;
    const models = (prov.models && prov.models.length > 0) ? prov.models : [];
    if (models.length === 0) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="5" style="color:var(--text-3); text-align:center; padding:18px">(该 provider 还没有配置模型，下面添加一个)</td>`;
        tbody.appendChild(tr);
        return;
    }
    for (const m of models) {
        const tr = document.createElement("tr");
        tr.dataset.model = m.name;
        if (settingsState.editingModel === m.name) {
            // Inline edit row.
            tr.innerHTML = `
                <td><code>${escapeHTML(m.name)}</code></td>
                <td><input class="edit-display" value="${escapeAttr(m.display_name || "")}"/></td>
                <td><input class="edit-ctx" type="number" min="0" value="${m.max_tokens_context || 0}"/></td>
                <td><input class="edit-out" type="number" min="0" value="${m.max_tokens_output || 0}"/></td>
                <td>
                    <div class="row-actions">
                        <button class="primary" data-act="save">保存</button>
                        <button data-act="cancel">取消</button>
                    </div>
                </td>
            `;
        } else {
            tr.innerHTML = `
                <td><code>${escapeHTML(m.name)}</code>${m.default ? ' <span class="pill">默认</span>' : ""}</td>
                <td>${escapeHTML(m.display_name || "")}</td>
                <td>${m.max_tokens_context ? formatTokens(m.max_tokens_context) : '<span style="color:var(--text-4)">—</span>'}</td>
                <td>${m.max_tokens_output ? formatTokens(m.max_tokens_output) : '<span style="color:var(--text-4)">—</span>'}</td>
                <td>
                    <div class="row-actions">
                        <button data-act="edit">编辑</button>
                        ${m.default ? "" : `<button data-act="default">设为默认</button>`}
                        <button class="danger" data-act="delete">删除</button>
                    </div>
                </td>
            `;
        }
        // Wire row actions.
        for (const btn of tr.querySelectorAll("button")) {
            btn.onclick = (ev) => handleModelRowAction(prov.name, m.name, btn.dataset.act, tr);
        }
        tbody.appendChild(tr);
    }
}

async function handleModelRowAction(provider, model, act, tr) {
    if (act === "edit") {
        settingsState.editingModel = model;
        renderSettingsModelTable();
        return;
    }
    if (act === "cancel") {
        settingsState.editingModel = null;
        renderSettingsModelTable();
        return;
    }
    if (act === "save") {
        const display = tr.querySelector(".edit-display").value.trim();
        const ctx = parseInt(tr.querySelector(".edit-ctx").value, 10) || 0;
        const out = parseInt(tr.querySelector(".edit-out").value, 10) || 0;
        try {
            await api(`/api/v1/providers/${encodeURIComponent(provider)}/models/${encodeURIComponent(model)}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    display_name: display,
                    max_tokens_context: ctx,
                    max_tokens_output: out,
                }),
            });
            settingsState.editingModel = null;
            toast("已保存");
            await loadProviders();
            renderSettingsModelTable();
        } catch (e) {
            toast("保存失败: " + e.message, "error");
        }
        return;
    }
    if (act === "default") {
        try {
            await api(`/api/v1/providers/${encodeURIComponent(provider)}/models/${encodeURIComponent(model)}/default`, {
                method: "POST",
            });
            toast(`已设 ${model} 为 ${provider} 的默认模型`);
            await loadProviders();
            renderSettingsModelTable();
        } catch (e) {
            toast("设置默认失败: " + e.message, "error");
        }
        return;
    }
    if (act === "delete") {
        if (!confirm(`删除模型 ${model}?`)) return;
        try {
            await api(`/api/v1/providers/${encodeURIComponent(provider)}/models/${encodeURIComponent(model)}`, {
                method: "DELETE",
            });
            toast(`已删除 ${model}`);
            await loadProviders();
            renderSettingsModelTable();
        } catch (e) {
            toast("删除失败: " + e.message, "error");
        }
        return;
    }
}

function renderSettingsProviderTable() {
    const tbody = $("settings-provider-tbody");
    tbody.innerHTML = "";
    for (const p of state.providers) {
        const tr = document.createElement("tr");
        // The default provider can't be deleted (the server
        // refuses too). Make that explicit in the UI so the
        // user doesn't wonder why the button is missing.
        const canDelete = !p.is_default;
        tr.innerHTML = `
            <td><code>${escapeHTML(p.name)}</code></td>
            <td>${escapeHTML(p.protocol || "")}</td>
            <td><code style="font-size:10px">${escapeHTML(p.base_url || "")}</code></td>
            <td>${p.api_key ? "••••" + escapeHTML(p.api_key.slice(-4)) : '<span style="color:var(--text-4)">(未设置)</span>'}</td>
            <td>
                ${p.is_default ? '<span class="pill">默认</span>' : `<button data-act="set-default">设为默认</button>`}
            </td>
            <td>
                <div class="row-actions">
                    ${canDelete ? `<button class="danger" data-act="delete-provider">删除</button>` : ''}
                </div>
            </td>
        `;
        const setDefault = tr.querySelector("button[data-act='set-default']");
        if (setDefault) {
            setDefault.onclick = async () => {
                try {
                    await api(`/api/v1/providers/${encodeURIComponent(p.name)}/default`, { method: "POST" });
                    toast(`已设 ${p.name} 为默认 provider`);
                    await loadProviders();
                } catch (e) {
                    toast("设置默认失败: " + e.message, "error");
                }
            };
        }
        const del = tr.querySelector("button[data-act='delete-provider']");
        if (del) {
            del.onclick = async () => {
                if (!confirm(`删除提供商 ${p.name}? 该操作不可撤销。`)) return;
                try {
                    await api(`/api/v1/providers/${encodeURIComponent(p.name)}`, { method: "DELETE" });
                    toast(`已删除 ${p.name}`);
                    // If we were using this provider, drop the
                    // local reference and switch to whatever's
                    // left (the server marks a new default
                    // automatically — well, actually it doesn't,
                    // so if the user deleted the *active* one
                    // they'd hit an error, but we already
                    // disabled the button for the default).
                    if (currentMeta().provider === p.name) {
                        // The current session is using the deleted
                        // provider. If a session is selected, push
                        // the fallback onto that session so the
                        // picker stays consistent. If no session
                        // is selected, just update the global
                        // default used by the next createSession().
                        const fallback = state.providers.find(x => x.name !== p.name && x.is_default)
                            || state.providers.find(x => x.name !== p.name);
                        if (fallback) {
                            const models = (fallback.models && fallback.models.length > 0) ? fallback.models : [{ name: fallback.model }];
                            const m = models.find(x => x.default) || models[0];
                            if (state.currentID) {
                                setSessionMeta(state.currentID, { provider: fallback.name, model: m ? m.name : fallback.model });
                            } else {
                                state.defaultProvider = fallback.name;
                                state.defaultModel = m ? m.name : fallback.model;
                            }
                        }
                    }
                    await loadProviders();
                } catch (e) {
                    toast("删除失败: " + e.message, "error");
                }
            };
        }
        tbody.appendChild(tr);
    }
}

async function addProviderSubmit() {
    const name = $("add-provider-name").value.trim();
    const protocol = $("add-provider-protocol").value;
    const baseURL = $("add-provider-baseurl").value.trim();
    const apiKey = $("add-provider-apikey").value;
    const firstModel = $("add-provider-model").value.trim();

    if (!name) { toast("提供商名称必填", "error"); return; }
    if (!baseURL) { toast("Base URL 必填", "error"); return; }
    // Reject obviously bad names. The server would reject
    // duplicates, but we also want to keep the name as a URL
    // path segment, so anything outside [a-zA-Z0-9_-] would
    // need URL-encoding and just looks ugly in the sidebar.
    if (!/^[a-zA-Z0-9_-]{1,40}$/.test(name)) {
        toast("名称只能用字母 / 数字 / 下划线 / 横线,最长 40 字符", "error");
        return;
    }

    const body = {
        name,
        protocol,
        base_url: baseURL,
        api_key: apiKey,
    };
    if (firstModel) body.model = firstModel;

    try {
        await api("/api/v1/providers", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
        });
        toast(`已添加提供商 ${name}`);
        $("add-provider-name").value = "";
        $("add-provider-baseurl").value = "";
        $("add-provider-apikey").value = "";
        $("add-provider-model").value = "";
        // Hide the form so the user can see the new entry in
        // the table.
        $("settings-provider-add").style.display = "none";
        $("add-provider-toggle").textContent = "+ 添加提供商";
        await loadProviders();
    } catch (e) {
        toast("添加失败: " + e.message, "error");
    }
}

async function addModelSubmit() {
    const prov = settingsActiveProvider();
    if (!prov) return;
    const name = $("add-model-name").value.trim();
    const display = $("add-model-display").value.trim();
    const ctx = parseInt($("add-model-ctx").value, 10) || 0;
    const out = parseInt($("add-model-out").value, 10) || 0;
    if (!name) { toast("模型 ID 必填", "error"); return; }
    try {
        await api(`/api/v1/providers/${encodeURIComponent(prov.name)}/models`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name,
                display_name: display,
                max_tokens_context: ctx,
                max_tokens_output: out,
            }),
        });
        toast(`已添加 ${name}`);
        $("add-model-name").value = "";
        $("add-model-display").value = "";
        $("add-model-ctx").value = "";
        $("add-model-out").value = "";
        // Collapse the form so the user sees the new model in
        // the table.
        $("settings-model-add").style.display = "none";
        $("add-model-toggle").textContent = "+ 添加模型";
        await loadProviders();
        renderSettingsModelTable();
    } catch (e) {
        toast("添加失败: " + e.message, "error");
    }
}

// formatTokens turns 128000 into "128k", 2000000 into "2m".
function formatTokens(n) {
    if (n >= 1_000_000 && n % 1_000_000 === 0) return (n / 1_000_000) + "m";
    if (n >= 1000 && n % 1000 === 0) return (n / 1000) + "k";
    return String(n);
}

// escapeHTML/escapeAttr are tiny safety helpers; the table
// cells display server-supplied data, so escaping is required.
function escapeHTML(s) {
    return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}
function escapeAttr(s) {
    return escapeHTML(s);
}

// ---------- Sessions ----------
async function loadSessions() {
    const r = await api("/api/v1/sessions");
    state.sessions = r.sessions || [];
    // Pull per-session provider/model/style off the response so
    // the picker state is right the moment the sidebar renders.
    // Old sessions (pre-meta) get empty objects; the per-session
    // resolver falls back to the configured default.
    for (const sess of state.sessions) {
        if (sess.provider || sess.model || sess.style) {
            state.sessionMeta[sess.id] = {
                provider: sess.provider,
                model:    sess.model,
                style:    sess.style,
            };
        }
    }
    renderSessionList();
    if (!state.currentID && state.sessions.length > 0) {
        await switchSession(state.sessions[0].id);
    } else if (state.sessions.length === 0) {
        showEmptyState();
    }
}

async function createSession() {
    // New conversations use the global default provider/model/style.
    // The server resolves empty values to the configured default +
    // that provider's EffectiveModel; we then mirror the response
    // into our local cache.
    const s = await api("/api/v1/sessions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            style:    state.defaultStyle,
            provider: state.defaultProvider,
            model:    state.defaultModel,
        }),
    });
    const newSession = {
        id: s.id,
        title: s.title || "",
        created_at: s.created_at || Math.floor(Date.now() / 1000),
        updated_at: s.updated_at || Math.floor(Date.now() / 1000),
    };
    state.sessions.unshift(newSession);
    // Mirror the server-resolved meta into the local cache.
    state.sessionMeta[s.id] = {
        provider: s.provider,
        model:    s.model,
        style:    s.style,
    };
    state.currentID = s.id;
    renderSessionList();
    await switchSession(s.id);
    focusInput();
}

// autoTitleFromMessage derives a short title from a user
// message. Used the first time the user sends a message in a
// session that still has the default "(无标题)" title — gives
// the sidebar a useful label without making the user rename
// manually.
function autoTitleFromMessage(text) {
    if (!text) return "";
    // Collapse whitespace, drop newlines so the title is a
    // single readable line.
    let t = text.replace(/\s+/g, " ").trim();
    if (!t) return "";
    // Cap at 24 chars + ellipsis. CJK chars are full-width
    // but UTF-16 length is the same as ASCII for slicing, so
    // we slice the JS string and let the renderer count
    // graphemes visually.
    const MAX = 24;
    if (t.length > MAX) {
        t = t.slice(0, MAX) + "…";
    }
    return t;
}

async function autoTitleIfBlank(sessionID, text) {
    // Only set a title if the session currently has none. The
    // user can still rename later by double-clicking the header.
    const s = state.sessions.find((x) => x.id === sessionID);
    if (!s || s.title) return;
    const t = autoTitleFromMessage(text);
    if (!t) return;
    try {
        await api(`/api/v1/sessions/${sessionID}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: t }),
        });
        s.title = t;
        renderSessionList();
        // If this is the active session, update the header
        // title (without triggering another history load).
        if (state.currentID === sessionID) {
            $("session-title").textContent = t;
        }
    } catch (e) {
        // Title is cosmetic; don't surface the failure to the
        // user.
    }
}

async function deleteSession(id) {
    if (!confirm("删除这个会话？")) return;
    await api(`/api/v1/sessions/${id}`, { method: "DELETE" });
    if (state.currentID === id) {
        state.currentID = null;
        showEmptyState();
    }
    await loadSessions();
}

async function renameSession(id, newTitle) {
    try {
        await api(`/api/v1/sessions/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: newTitle }),
        });
        await loadSessions();
    } catch (e) {
        toast("重命名失败: " + e.message, "error");
    }
}

async function loadMessages(id) {
    return api(`/api/v1/sessions/${id}/messages`);
}

// attachStreamingUI is called by switchSession when the user
// navigates to a session whose stream is still running in the
// background. The existing partialDiv is mounted into the
// messages pane, and the stream continues to feed it as new
// tokens arrive.
function attachStreamingUI(id) {
    const s = state.streaming[id];
    if (!s) return;
    const msgs = $("messages");
    msgs.innerHTML = "";
    // Rebuild from the existing history cache (if any) plus the
    // in-flight partial div so the user sees everything up to the
    // current point in the right order.
    const cached = state.sessionMessages[id] || [];
    for (const m of cached) appendHistoryMessage(m);
    // Re-attach the streaming partial at the end.
    if (s.partialDiv) msgs.appendChild(s.partialDiv);
    // If the user message is still in flight (rare — usually it's
    // already in the cache), make sure it's at the top.
    if (s.userDiv) msgs.insertBefore(s.userDiv, msgs.firstChild);
    scrollToBottom(true);
    showHeaderMeta();
}

async function switchSession(id) {
    // Do NOT abort streams here. Background streams keep
    // running so they auto-complete; the user can come back to
    // a fully-formed message. The streaming[id] entry stays
    // until the server closes the SSE.
    state.currentID = id;
    // Staged attachments belong to the message they were
    // picked for. Switching conversations drops them — the
    // files remain on the server until garbage-collected, but
    // the user has to re-pick them for the new conversation.
    // (Persistence is intentionally server-side: even if the
    // user logs out and back in, those uploaded files are
    // still retrievable by id.)
    if (state.pendingAttachments.length > 0) {
        state.pendingAttachments = [];
        renderPendingAttachments();
    }
    renderSessionList();
    // Picker state must reflect the per-session meta.
    renderProviderPicker();
    renderModelPicker();
    renderStylePicker();

    const s = state.sessions.find((x) => x.id === id);
    $("session-title").textContent = s ? (s.title || "(无标题)") : "未选择会话";

    $("messages").innerHTML = "";
    hideHeaderMeta();
    if (!s) { showEmptyState(); return; }

    // Three rendering cases:
    //   (A) this session is currently streaming → attach live UI
    //   (B) we have a cached message list → render it
    //   (C) fresh load from the server
    if (state.streaming[id]) {
        attachStreamingUI(id);
    } else if (state.sessionMessages[id]) {
        const msgs = state.sessionMessages[id];
        if (msgs.length === 0) {
            showEmptyState();
        } else {
            for (const m of msgs) appendHistoryMessage(m);
        }
        scrollToBottom(false);
    } else {
        try {
            const r = await loadMessages(id);
            const msgs = r.messages || [];
            state.sessionMessages[id] = msgs;
            if (msgs.length === 0) {
                showEmptyState();
            } else {
                for (const m of msgs) appendHistoryMessage(m);
            }
        } catch (e) {
            appendError(e.message);
        }
        scrollToBottom(false);
    }
    // The send/stop button reflects whether THIS session is
    // streaming — a different session may be streaming in the
    // background and we don't want to mis-attribute its state.
    refreshSendStopButton();
}

// ---------- Render ----------
function renderSessionList() {
    const list = $("session-list");
    list.innerHTML = "";
    for (const s of state.sessions) {
        const item = document.createElement("div");
        const isActive = s.id === state.currentID;
        item.className = "session-item" + (isActive ? " active" : "");
        item.dataset.id = s.id;
        const dot = state.streaming[s.id] ? `<span class="streaming-dot" title="正在生成"></span>` : "";
        item.innerHTML = `
            <div class="title">${escapeHTML(s.title || "(无标题)")}</div>
            <div class="time">${formatTime(s.updated_at)}</div>
            ${dot}
            <button class="del" title="删除">✕</button>
        `;
        item.addEventListener("click", (e) => {
            if (e.target.classList.contains("del")) {
                deleteSession(s.id);
            } else {
                switchSession(s.id);
            }
        });
        list.appendChild(item);
    }
}

function showEmptyState() {
    $("messages").innerHTML = `
        <div class="empty-state">
            <h2>👋 欢迎使用 P-Chat</h2>
            <p>新建一个会话或选择左侧已有会话开始对话</p>
        </div>`;
}

function appendHistoryMessage(m) {
    const role = m.role;
    if (role === "user") {
        appendMsg("user", m.content, false);
    } else if (role === "assistant") {
        appendMsg("assistant", m.content || "", false);
    } else if (role === "tool" || m.name) {
        appendToolMessage({
            tool_name: m.name || "tool",
            tool_result: m.content,
            tool_status: m.tool_call_id ? "ok" : "ok",
        });
    } else {
        // system or unknown
    }
}

function appendMsg(role, text, streaming) {
    const div = document.createElement("div");
    div.className = `msg ${role}` + (streaming ? " streaming" : "");
    if (text) div.innerHTML = renderMarkdown(text);
    $("messages").appendChild(div);
    if (streaming) scrollToBottom(true);
    return div;
}

function appendToolMessage(ev) {
    const div = document.createElement("div");
    div.className = "msg tool collapsed";
    if (ev.tool_status === "error") div.classList.add("error");
    if (ev.tool_status === "warn") div.classList.add("warn");

    const labelMap = { ok: "✓", error: "✗", warn: "!", start: "·" };
    const label = labelMap[ev.tool_status] || "·";
    div.innerHTML = `
        <div class="role">tool <span class="toggle">[展开]</span></div>
        <div><span class="label">${label} ${escapeHTML(ev.tool_name || "")}</span> ${escapeHTML(ev.tool_elapsed || "")}</div>
        ${ev.tool_args ? `<div class="args">${escapeHTML(truncate(ev.tool_args, 200))}</div>` : ""}
        ${ev.tool_result ? `<div class="result">${escapeHTML(truncate(ev.tool_result, 1000))}</div>` : ""}
        ${ev.tool_error ? `<div class="result">${escapeHTML(ev.tool_error)}</div>` : ""}
    `;
    div.querySelector(".toggle").onclick = (e) => {
        e.stopPropagation();
        div.classList.toggle("collapsed");
        e.target.textContent = div.classList.contains("collapsed") ? "[展开]" : "[收起]";
    };
    $("messages").appendChild(div);
    scrollToBottom(true);
    return div;
}

function appendError(msg) {
    const div = document.createElement("div");
    div.className = "error";
    div.textContent = msg;
    $("messages").appendChild(div);
    scrollToBottom(true);
}

function scrollToBottom(smooth) {
    const m = $("messages");
    m.scrollTo({ top: m.scrollHeight, behavior: smooth ? "smooth" : "instant" });
}

// ---------- Streaming ----------
async function sendMessage(text) {
    if (!state.currentID) await createSession();
    const id = state.currentID;
    removeEmptyState();

    const meta = currentMeta();
    // Append user + assistant divs to the messages pane (we may
    // be the active session OR we may be running in the
    // background — the latter means these divs live in the
    // current view briefly, then we drop them and operate on
    // detached nodes that we re-attach when the user comes back).
    const userDiv = appendMsg("user", text, false);
    const asstDiv = appendMsg("assistant", "", true);
    // Auto-generate the title from the first user message in a
    // fresh session. Fire-and-forget; the sidebar + header
    // update as soon as the PATCH returns, without blocking
    // the chat.
    autoTitleIfBlank(id, text);
    let contentBuf = "";
    let pending = "";  // pending markdown to render

    const ctrl = new AbortController();
    // Record this stream in state.streaming[id] so:
    //   - switchSession can re-attach the live UI to the view
    //   - renderSessionList can show the pulsing "●" indicator
    //   - refreshSendStopButton knows to show "stop" not "send"
    state.streaming[id] = { ctrl, userDiv, asstDiv, contentBuf: "" };
    if (id === state.currentID) {
        showStopButton();
        showHeaderMeta();
    }
    renderSessionList(); // pick up the streaming dot

    let lastRender = 0;
    function flushRender() {
        if (pending) {
            contentBuf += pending;
            pending = "";
            state.streaming[id].contentBuf = contentBuf;
            asstDiv.innerHTML = renderMarkdown(contentBuf);
        }
        if (id === state.currentID) scrollToBottom(true);
    }
    function scheduleRender() {
        const now = performance.now();
        if (now - lastRender > 50) {  // throttle: 20fps
            flushRender();
            lastRender = now;
        } else if (!scheduleRender._t) {
            scheduleRender._t = setTimeout(() => {
                scheduleRender._t = null;
                flushRender();
                lastRender = performance.now();
            }, 50);
        }
    }

    let provider = meta.provider, model = meta.model;
    // Snapshot the staged attachments for this turn. We only
    // send attachments that finished uploading successfully;
    // pending / failed ones stay in the strip so the user can
    // retry. The snapshot is consumed (state.pendingAttachments
    // cleared) on the first successful POST below.
    const atts = state.pendingAttachments
        .filter(a => !a._uploading && !a._error && a.id)
        .map(a => ({ id: a.id, name: a.name, kind: a.kind, mime: a.mime }));
    try {
        const res = await fetch(`${API}/api/v1/sessions/${id}/messages`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                message: text, style: meta.style, provider, model,
                attachments: atts,
            }),
            signal: ctrl.signal,
        });
        // First-line response means the request was accepted;
        // clear the chip strip regardless of streaming outcome.
        // (The server has already read the file from disk, so
        // we don't need to keep the metadata around.)
        if (atts.length > 0) {
            state.pendingAttachments = [];
            renderPendingAttachments();
        }
        if (!res.ok) {
            const t = await res.text();
            asstDiv.innerHTML = `<div class="error">${escapeHTML(t)}</div>`;
            return;
        }
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += dec.decode(value, { stream: true });
            const lines = buf.split("\n");
            buf = lines.pop();
            for (const line of lines) {
                if (!line.startsWith("data: ")) continue;
                let ev;
                try { ev = JSON.parse(line.slice(6)); } catch { continue; }
                if (ev.type === "content" && ev.content) {
                    pending += ev.content;
                    scheduleRender();
                } else if (ev.type === "tool") {
                    // Flush any pending content first.
                    flushRender();
                    appendToolMessage(ev);
                } else if (ev.type === "phase" && ev.message) {
                    // Could show a small "thinking" line; keep simple.
                } else if (ev.type === "error") {
                    flushRender();
                    const errDiv = document.createElement("div");
                    errDiv.className = "error";
                    errDiv.textContent = ev.error || "unknown error";
                    asstDiv.appendChild(errDiv);
                } else if (ev.type === "done") {
                    if (ev.provider) provider = ev.provider;
                    if (ev.model) model = ev.model;
                    updateHeaderMeta(ev.tokens_in, ev.tokens_out, ev.elapsed);
                }
            }
        }
        flushRender();
        if (!contentBuf && !asstDiv.querySelector(".error")) {
            asstDiv.innerHTML = "<em style='color:#666'>(空响应)</em>";
        }
    } catch (e) {
        if (e.name === "AbortError") {
            flushRender();
            const note = document.createElement("div");
            note.className = "phase";
            note.textContent = "⏹ 已停止生成";
            asstDiv.appendChild(note);
        } else {
            asstDiv.innerHTML = `<div class="error">${escapeHTML(e.message)}</div>`;
        }
    } finally {
        // Stream is done for this session — drop the streaming
        // entry and refresh the sidebar (so the pulsing dot
        // disappears). If the user is still on this session,
        // also flip the button back to "send".
        delete state.streaming[id];
        renderSessionList();
        if (id === state.currentID) {
            refreshSendStopButton();
            asstDiv.classList.remove("streaming");
        }
        // Server has the canonical state now (the assistant
        // message was persisted during the ReAct loop, plus the
        // user message). Refresh the in-memory cache so a
        // switch-back shows the latest content without a network
        // round-trip. Skip the network request when we ARE the
        // active session — our DOM already shows everything
        // correctly, and a refetch would only add latency.
        if (id !== state.currentID) {
            refreshSessionCache(id);
        } else {
            // Re-snapshot our current pane into the cache so a
            // later switch-back is fast.
            snapshotCurrentMessages(id);
        }
    }
}

// refreshSessionCache is the "background stream finished while
// the user was elsewhere" path. We pull a fresh message list
// from the server and replace the in-memory cache, so the next
// time the user switches to this session, the messages are
// already there. Errors are silent (toast) — the cache is
// best-effort.
async function refreshSessionCache(id) {
    try {
        const r = await loadMessages(id);
        state.sessionMessages[id] = r.messages || [];
    } catch (e) {
        // best-effort
    }
}

// snapshotCurrentMessages re-reads the DOM into the cache.
// Cheaper than a refetch and works for the active-session case
// where we just rendered everything live.
function snapshotCurrentMessages(id) {
    const msgs = $("messages").querySelectorAll(".msg");
    const out = [];
    for (const div of msgs) {
        const role = div.classList.contains("user") ? "user"
                   : div.classList.contains("assistant") ? "assistant"
                   : div.classList.contains("tool") ? "tool"
                   : null;
        if (!role) continue;
        out.push({
            role,
            content: div.dataset.rawContent || div.textContent || "",
            name: div.dataset.toolName || undefined,
        });
    }
    if (out.length > 0) state.sessionMessages[id] = out;
}

function stopGeneration() {
    // Abort only the current session's stream — any other
    // session streaming in the background is left alone.
    if (state.currentID && state.streaming[state.currentID]) {
        state.streaming[state.currentID].ctrl.abort();
    }
}

function showStopButton() {
    $("send").classList.add("hide");
    $("stop").classList.add("show");
}
function showSendButton() {
    $("send").classList.remove("hide");
    $("stop").classList.remove("show");
}

// refreshSendStopButton picks "stop" vs "send" based on whether
// the CURRENT session is streaming. A different session running
// in the background does NOT affect this.
function refreshSendStopButton() {
    if (state.currentID && state.streaming[state.currentID]) {
        showStopButton();
    } else {
        showSendButton();
    }
}

function showHeaderMeta() {
    $("header-meta").style.display = "flex";
}
function hideHeaderMeta() {
    $("header-meta").style.display = "none";
}
function updateHeaderMeta(tIn, tOut, elapsed) {
    if (typeof tIn === "number" && typeof tOut === "number") {
        $("meta-tokens").textContent = `${tIn} / ${tOut} tok`;
    }
    if (elapsed) {
        $("meta-elapsed").textContent = elapsed;
    }
}

function removeEmptyState() {
    const es = $("empty-state");
    if (es) es.remove();
}

// ---------- Markdown rendering (lightweight, no CDN) ----------
function renderMarkdown(src) {
    if (!src) return "";
    // 1. Extract code blocks into placeholders so the inline passes
    //    don't mangle them.
    const codeBlocks = [];
    src = src.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
        codeBlocks.push({ lang, code });
        return `\u0000CODE${codeBlocks.length - 1}\u0000`;
    });
    // 2. Inline code
    const inlineCodes = [];
    src = src.replace(/`([^`\n]+)`/g, (m, c) => {
        inlineCodes.push(c);
        return `\u0000IC${inlineCodes.length - 1}\u0000`;
    });
    // 3. Escape HTML
    src = escapeHTML(src);
    // 4. Headings
    src = src.replace(/^### (.+)$/gm, "<h3>$1</h3>");
    src = src.replace(/^## (.+)$/gm, "<h2>$1</h2>");
    src = src.replace(/^# (.+)$/gm, "<h1>$1</h1>");
    // 5. Bold / italic
    src = src.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    src = src.replace(/(^|\W)\*([^*\n]+)\*/g, "$1<em>$2</em>");
    // 6. Links [text](url)
    src = src.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, t, u) => {
        if (!/^https?:\/\//.test(u) && !u.startsWith("/")) return `${t}`;
        return `<a href="${u}" target="_blank" rel="noopener">${t}</a>`;
    });
    // 7. Blockquote
    src = src.replace(/^&gt; (.+)$/gm, "<blockquote>$1</blockquote>");
    // 8. Horizontal rule
    src = src.replace(/^---$/gm, "<hr>");
    // 9. Unordered lists
    src = src.replace(/(^|\n)((?:[-*] .+\n?)+)/g, (m, pre, block) => {
        const items = block.trim().split("\n").map(l => `<li>${l.replace(/^[-*] /, "")}</li>`).join("");
        return `${pre}<ul>${items}</ul>`;
    });
    // 10. Ordered lists
    src = src.replace(/(^|\n)((?:\d+\. .+\n?)+)/g, (m, pre, block) => {
        const items = block.trim().split("\n").map(l => `<li>${l.replace(/^\d+\. /, "")}</li>`).join("");
        return `${pre}<ol>${items}</ol>`;
    });
    // 11. Paragraphs: collapse consecutive newlines, wrap each line
    src = src.split(/\n{2,}/).map(p => {
        if (/^<(h\d|ul|ol|blockquote|hr|pre)/.test(p.trim())) return p;
        // Code-block placeholders must be treated as block-level too,
        // so they don't get wrapped in <p>.
        if (/^\u0000CODE\d+\u0000$/.test(p.trim())) return p;
        return `<p>${p.replace(/\n/g, "<br>")}</p>`;
    }).join("\n");
    // 12. Restore code blocks / inline code
    src = src.replace(/\u0000CODE(\d+)\u0000/g, (_, i) => {
        const b = codeBlocks[+i];
        return `<pre><code class="lang-${escapeHTML(b.lang)}">${escapeHTML(b.code)}</code></pre>`;
    });
    src = src.replace(/\u0000IC(\d+)\u0000/g, (_, i) => {
        return `<code>${escapeHTML(inlineCodes[+i])}</code>`;
    });
    return src;
}

// ---------- Helpers ----------
function escapeHTML(s) {
    if (s == null) return "";
    return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function truncate(s, n) {
    s = String(s || "");
    if (s.length <= n) return s;
    return s.slice(0, n) + "…";
}

function formatTime(unixSec) {
    if (!unixSec) return "";
    const d = new Date(unixSec * 1000);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
        return d.toTimeString().slice(0, 5);
    }
    return (d.getMonth() + 1) + "/" + d.getDate();
}

// ---------- Attachments ----------
//
// The attachment flow is:
//   1. user picks files via the paperclip button (or drags
//      future versions) → <input type="file" multiple>
//   2. each file is POSTed to /api/v1/uploads (multipart); the
//      response carries { id, name, size, kind, mime }
//   3. we stage the metadata in state.pendingAttachments and
//      render a chip for each
//   4. on send, the staged metadata goes into the request body
//      as `attachments: [...]`; the server resolves each id
//      to an on-disk file and expands the user message into a
//      multi-part content array
//   5. on successful send, the chip is removed from the strip
//
// State is per-message, not per-session: switching sessions
// drops the staged chips. This matches the typical chat-app
// behaviour and avoids the "stale file from yesterday's
// conversation" surprise.

// fileIconFor returns a single-character glyph for a given
// attachment kind. Image kinds get nothing (the chip uses the
// actual <img> thumbnail instead).
function fileIconFor(kind) {
    switch (kind) {
        case "audio": return "🔊";
        case "text":  return "≡";
        case "file":  return "📄";
        default:      return "📎";
    }
}

// modelSupportsVision returns true when the currently-active
// model name suggests it can read images. Heuristic — the
// /providers response doesn't currently expose a capability
// flag, so we match common naming patterns. False positives
// are fine (we only use this for an inline hint, not to gate
// the request).
function modelSupportsVision(modelName) {
    if (!modelName) return false;
    const m = String(modelName).toLowerCase();
    if (m.includes("vision") || m.includes("gpt-4o") || m.includes("gpt-4-vision")
        || m.includes("claude-3") || m.includes("claude-4") || m.includes("opus")
        || m.includes("sonnet") || m.includes("haiku") || m.includes("gemini")
        || m.includes("qwen-vl") || m.includes("doubao-vision")
        || m.includes("yi-vision") || m.includes("mimo-v")) return true;
    return false;
}

function renderPendingAttachments() {
    const wrap = $("attachments");
    wrap.innerHTML = "";
    const meta = currentMeta();
    const hasImage = state.pendingAttachments.some(a => a.kind === "image");
    const visionCapable = modelSupportsVision(meta.model);
    if (hasImage && !visionCapable) {
        // Inline hint: the user is staging an image but the
        // currently-selected model likely can't read it. We
        // don't block the send — the user may know better
        // (some proxy endpoints map image to text descriptions)
        // — but we make the caveat obvious.
        const hint = document.createElement("div");
        hint.className = "attach-hint";
        hint.textContent = `当前模型 “${meta.model}” 可能不支持图片,建议切到视觉模型(GPT-4o / Claude 3.5 Sonnet / Doubao-vision)`;
        wrap.appendChild(hint);
    }
    for (let i = 0; i < state.pendingAttachments.length; i++) {
        const a = state.pendingAttachments[i];
        const chip = document.createElement("div");
        chip.className = "attachment-chip" + (a._uploading ? " uploading" : "") + (a._error ? " error" : "");
        chip.dataset.idx = i;
        const thumb = document.createElement("div");
        thumb.className = "thumb";
        if (a.kind === "image") {
            const img = document.createElement("img");
            img.src = `${API}/api/v1/uploads/${encodeURIComponent(a.id)}`;
            img.alt = a.name;
            thumb.appendChild(img);
        } else {
            thumb.textContent = fileIconFor(a.kind);
        }
        const name = document.createElement("div");
        name.className = "name";
        name.textContent = a.name;
        name.title = `${a.name} (${formatSize(a.size)}, ${a.kind})`;
        const rm = document.createElement("button");
        rm.className = "remove";
        rm.title = "移除";
        rm.textContent = "×";
        rm.onclick = (e) => {
            e.stopPropagation();
            state.pendingAttachments.splice(i, 1);
            renderPendingAttachments();
        };
        chip.append(thumb, name, rm);
        wrap.appendChild(chip);
    }
}

function formatSize(n) {
    if (!n) return "0 B";
    if (n < 1024) return n + " B";
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
    return (n / 1024 / 1024).toFixed(1) + " MB";
}

// uploadOneFile POSTs a single file to /api/v1/uploads and
// returns the metadata. Errors are surfaced via toast and a
// short-lived "error" chip (the user can × it and retry).
async function uploadOneFile(file) {
    const idx = state.pendingAttachments.length;
    const placeholder = {
        id: "", name: file.name, size: file.size,
        kind: "file", mime: file.type || "",
        _uploading: true, _error: false,
    };
    state.pendingAttachments.push(placeholder);
    renderPendingAttachments();
    const fd = new FormData();
    fd.append("file", file);
    try {
        const res = await fetch(`${API}/api/v1/uploads`, { method: "POST", body: fd });
        if (!res.ok) {
            const t = await res.text();
            throw new Error(`HTTP ${res.status}: ${t}`);
        }
        const meta = await res.json();
        state.pendingAttachments[idx] = {
            id: meta.id, name: meta.name, size: meta.size,
            kind: meta.kind, mime: meta.mime,
        };
        renderPendingAttachments();
    } catch (e) {
        // Mark the placeholder as failed; user can × and retry.
        state.pendingAttachments[idx]._uploading = false;
        state.pendingAttachments[idx]._error = true;
        renderPendingAttachments();
        toast(`上传失败: ${e.message}`, "error");
    }
}

// ---------- Event handlers ----------
$("send").addEventListener("click", () => {
    const input = $("input");
    const text = input.value.trim();
    // Block sending if the CURRENT session is already streaming.
    // (A different session streaming in the background is fine.)
    const currentStreaming = state.currentID && state.streaming[state.currentID];
    if (!text || currentStreaming) return;
    input.value = "";
    input.style.height = "auto";
    $("send").disabled = true;
    sendMessage(text).finally(() => { $("send").disabled = false; });
});

$("stop").addEventListener("click", stopGeneration);

$("new-session").addEventListener("click", async () => {
    // Don't abort the current session's stream — let it keep
    // running in the background. The user just navigates to a
    // fresh session; the old one completes automatically.
    await createSession();
});

// Attach-file button: opens the native file picker. The
// <input type="file" multiple> is hidden; we click it
// programmatically. After the user picks, we upload each file
// in parallel — the chips appear in pending state and become
// real once the upload completes.
$("attach-btn").addEventListener("click", () => {
    $("attach-input").click();
});
$("attach-input").addEventListener("change", async (e) => {
    const files = Array.from(e.target.files || []);
    e.target.value = ""; // reset so the same file can be picked again
    for (const f of files) {
        uploadOneFile(f);
    }
});

// Drag-and-drop support: dropping a file onto the messages pane
// or the input area adds it to the staged attachments. The
// <input type="file"> doesn't fire for drops; we wire the same
// uploadOneFile path so the picker and DnD stay in sync.
const DROP_ZONES = [$("messages"), $("input-wrap"), $("attach-btn")];
for (const z of DROP_ZONES) {
    if (!z) continue;
    // dragenter / dragover must preventDefault for drop to fire.
    z.addEventListener("dragover", (e) => {
        if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes("Files")) {
            e.preventDefault();
            z.classList.add("dragover");
        }
    });
    z.addEventListener("dragleave", () => z.classList.remove("dragover"));
    z.addEventListener("drop", (e) => {
        e.preventDefault();
        z.classList.remove("dragover");
        const files = Array.from(e.dataTransfer?.files || []);
        for (const f of files) {
            uploadOneFile(f);
        }
    });
}
// Suppress the browser's default "open file" behaviour when
// the user misses the drop zone and drops onto document body.
window.addEventListener("dragover", (e) => {
    if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes("Files")) {
        e.preventDefault();
    }
});
window.addEventListener("drop", (e) => {
    if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes("Files")) {
        e.preventDefault();
        const files = Array.from(e.dataTransfer?.files || []);
        for (const f of files) {
            uploadOneFile(f);
        }
    }
});

// Clipboard image paste: a screenshot copied to the
// clipboard (Snipping Tool, PrintScreen, etc.) lands on the
// textarea as a `paste` event with image/png in the
// clipboardData. Stage it as an attachment; no file picker
// involved.
$("input").addEventListener("paste", (e) => {
    const items = e.clipboardData?.items || [];
    for (const it of items) {
        if (it.kind === "file" && it.type.startsWith("image/")) {
            const file = it.getAsFile();
            if (file) {
                e.preventDefault();
                // Give it a sensible name — clipboard items
                // don't carry a filename on most platforms.
                const name = file.name && file.name !== "image.png"
                    ? file.name
                    : `clipboard-${Date.now()}.png`;
                const renamed = new File([file], name, { type: file.type });
                uploadOneFile(renamed);
            }
        }
    }
});

// Settings modal wiring
$("open-settings").addEventListener("click", openSettings);
$("settings-close").addEventListener("click", closeSettings);
$("settings-modal").addEventListener("click", (e) => {
    if (e.target === $("settings-modal")) closeSettings();
});
for (const t of document.querySelectorAll(".settings-tab")) {
    t.addEventListener("click", () => switchSettingsTab(t.dataset.tab));
}
$("add-model-submit").addEventListener("click", addModelSubmit);
$("add-model-cancel").addEventListener("click", () => {
    $("add-model-name").value = "";
    $("add-model-display").value = "";
    $("add-model-ctx").value = "";
    $("add-model-out").value = "";
});
// "+ 添加模型" toggle (top of the Models tab). The form
// already lives below the table; this button shows/hides it.
$("add-model-toggle").addEventListener("click", () => {
    const f = $("settings-model-add");
    const showing = f.style.display !== "none";
    f.style.display = showing ? "none" : "";
    $("add-model-toggle").textContent = showing ? "+ 添加模型" : "× 收起";
});
$("add-provider-submit").addEventListener("click", addProviderSubmit);
$("add-provider-cancel").addEventListener("click", () => {
    $("add-provider-name").value = "";
    $("add-provider-baseurl").value = "";
    $("add-provider-apikey").value = "";
    $("add-provider-model").value = "";
});
$("add-provider-toggle").addEventListener("click", () => {
    const f = $("settings-provider-add");
    const showing = f.style.display !== "none";
    f.style.display = showing ? "none" : "";
    $("add-provider-toggle").textContent = showing ? "+ 添加提供商" : "× 收起";
});

const input = $("input");
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        $("send").click();
    } else if (e.key === "Escape" && state.currentID && state.streaming[state.currentID]) {
        e.preventDefault();
        stopGeneration();
    }
});
// auto-grow textarea
input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
});

// session title: double-click to rename
$("session-title").addEventListener("dblclick", () => {
    if (!state.currentID) return;
    const el = $("session-title");
    el.contentEditable = "true";
    el.focus();
    // select all
    const r = document.createRange();
    r.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(r);
});
$("session-title").addEventListener("blur", async () => {
    const el = $("session-title");
    if (el.contentEditable !== "true") return;
    el.contentEditable = "false";
    const newTitle = el.textContent.trim();
    if (newTitle && state.currentID) {
        await renameSession(state.currentID, newTitle);
    }
});
$("session-title").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        e.preventDefault();
        $("session-title").blur();
    } else if (e.key === "Escape") {
        e.preventDefault();
        // restore old title
        const s = state.sessions.find(x => x.id === state.currentID);
        $("session-title").textContent = s ? (s.title || "(无标题)") : "未选择会话";
        $("session-title").blur();
    }
});

// ---------- Boot ----------
(async function init() {
    try {
        await Promise.all([loadStyles(), loadProviders()]);
        // Default style for fresh sessions.
        if (state.styles.find(s => s.id === "tech")) state.defaultStyle = "tech";
        // Default provider + model for fresh sessions. These get
        // used by createSession() when no session is selected.
        if (state.providers.length > 0) {
            // Prefer the server-marked default; fall back to the
            // first provider.
            const def = state.providers.find(p => p.is_default) || state.providers[0];
            state.defaultProvider = def.name;
            const models = (def.models && def.models.length > 0) ? def.models : [{ name: def.model }];
            const m = models.find(x => x.default) || models[0];
            state.defaultModel = m ? m.name : def.model;
        }
        renderStylePicker();
        renderProviderPicker();
        renderModelPicker();
        // loadSessions re-hydrates state.sessionMeta from the
        // server response, then switchSession (called inside) sets
        // the picker to match the per-session meta.
        await loadSessions();
    } catch (e) {
        appendError("初始化失败: " + e.message);
    }
    focusInput();
})();

function focusInput() {
    setTimeout(() => $("input").focus(), 50);
}
</script>
