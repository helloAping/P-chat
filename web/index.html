<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P-Chat</title>
<style>
:root {
    --bg: #0a0a0a;
    --bg-2: #0d0d0d;
    --bg-3: #141414;
    --bg-4: #1a1a1a;
    --bg-input: #161618;
    --border: #1f1f1f;
    --border-2: #2a2a2a;
    --text: #e0e0e0;
    --text-2: #aaa;
    --text-3: #777;
    --text-4: #555;
    --accent: #4a4dff;
    --accent-2: #7c8dff;
    --accent-bg: #1a1a2e;
    --accent-bg-2: #2a2a3e;
    --error: #c66;
    --warn: #e0a040;
    --ok: #5cd29f;
    --user-bg: #1a1a2e;
    --asst-bg: #141414;
    --tool-bg: #181a1f;
    --tool-border: #2a2d35;
    --shadow: 0 4px 16px rgba(0,0,0,0.4);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Consolas", "Microsoft YaHei Mono", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 56px 1fr 88px;
    height: 100vh;
    overflow: hidden;
}
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }

/* ====== Sidebar ====== */
#sidebar {
    grid-row: 1 / span 3;
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
}
#sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
}
#sidebar-header h1 { font-size: 16px; font-weight: 600; flex: 1; }
#new-session {
    background: var(--accent-bg); color: var(--accent-2);
    border: 1px solid #2d2d4e;
    border-radius: 6px; padding: 5px 10px;
    cursor: pointer; font-size: 12px;
    transition: background 0.15s;
}
#new-session:hover { background: var(--accent-bg-2); }
#session-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.session-item {
    padding: 8px 16px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    color: var(--text-2);
    border-left: 3px solid transparent;
    transition: background 0.1s;
}
.session-item:hover { background: var(--bg-3); color: #eee; }
.session-item.active {
    background: var(--accent-bg); color: #fff;
    border-left-color: var(--accent-2);
}
.session-item .title { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-item .time { font-size: 10px; color: var(--text-4); }
.session-item .del { opacity: 0; color: var(--error); font-size: 11px; padding: 2px 6px; background: transparent; border: none; }
.session-item:hover .del { opacity: 1; }
.session-item .del:hover { color: #f55; }
/* Pulsing dot next to sessions that are streaming in the background. */
.session-item .streaming-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent-2);
    box-shadow: 0 0 6px var(--accent-2);
    animation: streaming-pulse 1.4s ease-in-out infinite;
    flex-shrink: 0;
    margin-left: 4px;
}
@keyframes streaming-pulse {
    0%, 100% { opacity: 0.45; transform: scale(0.85); }
    50%      { opacity: 1;    transform: scale(1.1); }
}

#sidebar-footer {
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 8px;
    flex-shrink: 0;
}
.sidebar-section { font-size: 10px; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.5px; }
.style-picker { display: flex; gap: 4px; }
.style-btn {
    flex: 1; padding: 5px 6px; font-size: 11px;
    background: var(--bg-3); color: var(--text-2);
    border: 1px solid var(--border-2);
    border-radius: 5px;
    transition: all 0.15s;
}
.style-btn:hover { background: var(--bg-4); color: #fff; }
.style-btn.active {
    background: var(--accent-bg); color: var(--accent-2);
    border-color: var(--accent);
}
.model-picker {
    width: 100%;
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border-2);
    border-radius: 5px;
    padding: 6px 8px;
    font-size: 12px;
    cursor: pointer;
}
.model-picker:hover { border-color: var(--accent); }
.model-picker:focus { outline: none; border-color: var(--accent); }

/* Two-level cascade: provider → model row in sidebar */
.model-row {
    display: flex; gap: 4px; align-items: center;
}
.model-row .model-picker { flex: 1; min-width: 0; }
.model-row .icon-btn {
    flex: 0 0 26px; height: 28px;
    background: var(--bg-3); color: var(--text-2);
    border: 1px solid var(--border-2);
    border-radius: 5px; cursor: pointer;
    font-size: 13px; line-height: 1;
}
.model-row .icon-btn:hover { background: var(--bg-4); color: var(--accent-2); }

/* ====== Settings modal (provider models) ====== */
.settings-modal { min-width: 640px; max-width: 760px; }
.settings-tabs {
    display: flex; gap: 4px; margin-bottom: 12px;
    border-bottom: 1px solid var(--border-2);
}
.settings-tab {
    padding: 6px 12px; font-size: 12px; cursor: pointer;
    background: transparent; color: var(--text-3);
    border: none; border-bottom: 2px solid transparent;
}
.settings-tab.active { color: var(--accent-2); border-bottom-color: var(--accent); }
.settings-tab:hover { color: var(--text); }
.settings-tab-body { max-height: 480px; overflow-y: auto; }

.model-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
}
.model-table th, .model-table td {
    text-align: left; padding: 6px 8px;
    border-bottom: 1px solid var(--border-2);
}
.model-table th { color: var(--text-3); font-weight: 500; }
.model-table td .pill {
    display: inline-block; padding: 1px 6px; border-radius: 8px;
    background: var(--accent-bg); color: var(--accent-2);
    font-size: 10px;
}
.model-table td .row-actions { display: flex; gap: 4px; }
.model-table td .row-actions button {
    padding: 2px 8px; font-size: 11px; cursor: pointer;
    background: var(--bg-3); color: var(--text-2);
    border: 1px solid var(--border-2); border-radius: 4px;
}
.model-table td .row-actions button:hover { background: var(--bg-4); }
.model-table td .row-actions button.danger { color: var(--error); }
.model-table td .row-actions button.danger:hover { background: #2a1818; }
.model-table td .row-actions button.primary { color: var(--accent-2); }

.model-add-form {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px;
    margin-top: 14px; padding: 12px;
    background: var(--bg-3); border: 1px dashed var(--border-2);
    border-radius: 6px;
}
.model-add-form h4 {
    grid-column: 1 / -1; margin: 0 0 4px 0; font-size: 12px;
    color: var(--text-3); font-weight: 500;
}
.model-add-form label {
    display: flex; flex-direction: column; gap: 3px;
    font-size: 11px; color: var(--text-3);
}
.model-add-form input, .model-add-form select {
    background: var(--bg-input); color: var(--text);
    border: 1px solid var(--border-2); border-radius: 4px;
    padding: 5px 8px; font-size: 12px;
    font-family: var(--mono);
}
.model-add-form input:focus, .model-add-form select:focus { outline: none; border-color: var(--accent); }
.model-add-form .actions {
    grid-column: 1 / -1; display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 4px;
}
.model-add-form .actions button {
    padding: 5px 12px; font-size: 12px; cursor: pointer;
    background: var(--bg-3); color: var(--text);
    border: 1px solid var(--border-2); border-radius: 4px;
}
.model-add-form .actions button.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
}

.model-edit-form { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; }
.model-edit-form label { display: flex; flex-direction: column; gap: 2px; font-size: 10px; color: var(--text-3); }
.model-edit-form input {
    background: var(--bg-input); color: var(--text);
    border: 1px solid var(--border-2); border-radius: 4px;
    padding: 3px 6px; font-size: 11px;
    font-family: var(--mono); width: 100%; min-width: 80px;
}
.model-edit-form input:focus { outline: none; border-color: var(--accent); }

/* ====== Header ====== */
#header {
    grid-row: 1; grid-column: 2;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: var(--bg);
}
#session-title { font-size: 15px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#session-title[contenteditable="true"] {
    background: var(--bg-3);
    border-radius: 4px;
    padding: 2px 6px;
    outline: 1px solid var(--accent);
}
.header-meta { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-3); }
.header-meta .pill {
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    padding: 2px 8px; border-radius: 10px;
}

/* ====== Messages ====== */
#messages {
    grid-row: 2; grid-column: 2;
    overflow-y: auto;
    padding: 24px 32px;
    display: flex; flex-direction: column;
    scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 8px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
#messages::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

.msg {
    margin-bottom: 16px;
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 8px;
    line-height: 1.6;
    word-wrap: break-word;
    font-size: 14px;
}
.msg.user { align-self: flex-end; background: var(--user-bg); }
.msg.assistant { align-self: flex-start; background: var(--asst-bg); }
.msg.tool {
    align-self: stretch; max-width: 100%;
    background: var(--tool-bg); border: 1px solid var(--tool-border);
    color: #9ab; font-size: 12px; font-family: var(--mono);
    padding: 8px 12px;
}
.msg.tool.error { border-color: #4a2828; color: var(--error); }
.msg.tool.warn { border-color: #4a4028; color: var(--warn); }
.msg.tool .role { font-size: 10px; color: var(--text-4); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.msg.tool .label { color: var(--accent-2); }
.msg.tool .args { color: #678; font-size: 11px; margin-top: 2px; white-space: pre-wrap; word-break: break-all; }
.msg.tool .result { white-space: pre-wrap; color: #789; margin-top: 4px; max-height: 200px; overflow-y: auto; }
.msg.tool .toggle {
    color: var(--text-3); font-size: 10px; cursor: pointer;
    margin-left: 8px; user-select: none;
}
.msg.tool .toggle:hover { color: var(--accent-2); }
.msg.tool.collapsed .args, .msg.tool.collapsed .result { display: none; }

/* Markdown-rendered content */
.msg p { margin: 0 0 8px 0; }
.msg p:last-child { margin-bottom: 0; }
.msg h1, .msg h2, .msg h3 { margin: 12px 0 6px 0; font-weight: 600; line-height: 1.3; }
.msg h1 { font-size: 18px; }
.msg h2 { font-size: 16px; }
.msg h3 { font-size: 14px; }
.msg ul, .msg ol { margin: 4px 0 8px 0; padding-left: 20px; }
.msg li { margin: 2px 0; }
.msg code {
    font-family: var(--mono); font-size: 0.9em;
    background: rgba(255,255,255,0.08);
    padding: 1px 5px; border-radius: 3px;
}
.msg pre {
    margin: 6px 0;
    background: var(--bg);
    border: 1px solid var(--border-2);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.5;
}
.msg pre code {
    background: transparent; padding: 0; font-size: inherit;
}
.msg blockquote {
    border-left: 3px solid var(--border-2);
    margin: 6px 0; padding: 2px 0 2px 12px;
    color: var(--text-2);
}
.msg a { color: var(--accent-2); text-decoration: none; }
.msg a:hover { text-decoration: underline; }
.msg hr { border: none; border-top: 1px solid var(--border-2); margin: 8px 0; }
.msg table { border-collapse: collapse; margin: 6px 0; }
.msg th, .msg td { border: 1px solid var(--border-2); padding: 4px 8px; }
.msg th { background: var(--bg-3); }

/* Cursor blink for streaming */
.streaming::after {
    content: "▍";
    color: var(--accent-2);
    animation: blink 1s steps(2) infinite;
    margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

.phase {
    align-self: stretch; text-align: center;
    color: var(--text-4); font-size: 11px; padding: 4px;
    font-style: italic;
}
.error { color: var(--error); background: #2a1818; padding: 8px 12px; border-radius: 6px; margin: 8px 0; font-size: 13px; }
.empty-state { color: var(--text-4); text-align: center; margin: auto; padding: 32px; }
.empty-state h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text-3); }
.empty-state p { font-size: 13px; }

/* ====== Input area ====== */
#input-area {
    grid-row: 3; grid-column: 1 / -1;
    padding: 12px 24px 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--bg);
}
#input-wrap {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    padding: 10px 14px;
    transition: border-color 0.15s;
    display: flex; flex-direction: column;
}
#input-wrap:focus-within { border-color: var(--accent); }
#input {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    outline: none;
    resize: none;
    min-height: 20px;
    max-height: 120px;
    width: 100%;
    font-family: inherit;
}
#input-hint {
    font-size: 10px; color: var(--text-4); margin-top: 4px;
    display: flex; gap: 12px;
}
#input-hint kbd {
    background: var(--bg-3); border: 1px solid var(--border-2);
    border-radius: 3px; padding: 0 4px; font-family: var(--mono); font-size: 9px;
}
#send, #stop, #attach-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px;
    padding: 0 18px; cursor: pointer;
    font-size: 14px; font-weight: 500;
    height: 40px;
    transition: background 0.15s;
}
#send:hover { background: #5a5dff; }
#send:disabled { background: #333; color: #666; cursor: not-allowed; }
#stop { background: var(--error); display: none; }
#stop:hover { background: #d77; }
#attach-btn {
    background: var(--bg-3); color: var(--text-2);
    border: 1px dashed var(--border-2);
    border-radius: 10px;
    padding: 0 12px;
    width: auto; height: 40px;
    font-size: 12px;
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
}
#attach-btn:hover { background: var(--bg-4); border-color: var(--accent-2); color: var(--accent-2); }
#attach-btn .icon { font-size: 16px; line-height: 1; }
#attach-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Highlight the drop zone while a file is being dragged
 * over the messages pane. */
#messages.dragover, #input-wrap.dragover {
    outline: 2px dashed var(--accent-2);
    outline-offset: -4px;
    background: var(--bg-3);
}

/* Attachment strip: shown above the textarea when at least one
 * file is staged. Each chip is a small preview card: image files
 * get a 40x40 thumbnail via /api/v1/uploads/:id, everything else
 * gets a generic file icon + name. Clicking the × removes the
 * attachment from the next message; it does NOT delete the file
 * on the server (uploads are session-scoped; gc is TODO). */
#attachments {
    flex: 1;
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 0 6px 0;
}
#attachments:empty { display: none; }
.attachment-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 6px;
    padding: 4px 8px 4px 4px;
    font-size: 11px; color: var(--text-2);
    max-width: 200px;
}
.attachment-chip .thumb {
    width: 28px; height: 28px; border-radius: 4px;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--text-3);
    flex-shrink: 0;
    overflow: hidden;
}
.attachment-chip .thumb img {
    width: 100%; height: 100%; object-fit: cover;
}
.attachment-chip .name {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.attachment-chip .remove {
    background: transparent; border: none;
    color: var(--text-4); cursor: pointer;
    font-size: 14px; padding: 0 4px;
    line-height: 1;
}
.attachment-chip .remove:hover { color: var(--error); }
.attachment-chip.uploading { opacity: 0.5; }
.attachment-chip.error { border-color: var(--error); }
.attach-hint {
    flex: 1 0 100%;
    background: rgba(255, 180, 0, 0.08);
    border: 1px solid rgba(255, 180, 0, 0.3);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    color: #ffcb6b;
    line-height: 1.4;
}
#stop.show { display: block; }
#send.hide { display: none; }

/* Modal */
.modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
}
.modal-backdrop.show { display: flex; }
.modal {
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    border-radius: 10px;
    padding: 20px;
    min-width: 360px; max-width: 480px;
    box-shadow: var(--shadow);
}
.modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.modal-list { max-height: 320px; overflow-y: auto; margin: 8px 0; }
.modal-item {
    padding: 10px 12px; border-radius: 6px;
    cursor: pointer; display: flex; align-items: center; gap: 10px;
    transition: background 0.1s;
}
.modal-item:hover { background: var(--bg-3); }
.modal-item.active { background: var(--accent-bg); }
.modal-item .name { flex: 1; font-size: 13px; }
.modal-item .meta { font-size: 11px; color: var(--text-3); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
.modal-btn {
    padding: 6px 12px; border-radius: 5px; font-size: 12px;
    background: var(--bg-3); color: var(--text);
    border: 1px solid var(--border-2);
}
.modal-btn:hover { background: var(--bg-4); }
.modal-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Toast */
.toast {
    position: fixed; bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-3); color: var(--text);
    border: 1px solid var(--border-2);
    border-radius: 6px; padding: 8px 14px;
    font-size: 12px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 200;
    box-shadow: var(--shadow);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: #2a1818; border-color: #4a2828; color: var(--error); }
</style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-header">
        <h1>P-Chat</h1>
        <button id="new-session" title="新建会话">+ 新建</button>
    </div>
    <div id="session-list"></div>
    <div id="sidebar-footer">
        <div class="sidebar-section">风格</div>
        <div class="style-picker" id="style-picker"></div>
        <div class="sidebar-section">模型</div>
        <div class="model-row">
            <select class="model-picker" id="provider-picker" title="选择提供商"></select>
        </div>
        <div class="model-row" style="margin-top:4px">
            <select class="model-picker" id="model-picker" title="选择模型"></select>
            <button class="icon-btn" id="open-settings" title="配置提供商 / 模型">⚙</button>
        </div>
    </div>
</div>

<div id="header">
    <div id="session-title" title="双击重命名">未选择会话</div>
    <div class="header-meta" id="header-meta" style="display:none">
        <span class="pill" id="meta-tokens">0 / 0 tok</span>
        <span class="pill" id="meta-elapsed">0.0s</span>
    </div>
</div>

<div id="messages">
    <div class="empty-state" id="empty-state">
        <h2>👋 欢迎使用 P-Chat</h2>
        <p>新建一个会话或选择左侧已有会话开始对话</p>
    </div>
</div>

<div id="input-area">
    <div id="input-wrap">
        <div id="attachments"></div>
        <textarea id="input" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行，Esc 取消"></textarea>
        <div id="input-hint">
            <span><kbd>Enter</kbd> 发送</span>
            <span><kbd>Shift</kbd>+<kbd>Enter</kbd> 换行</span>
            <span><kbd>Esc</kbd> 取消</span>
        </div>
    </div>
    <button id="attach-btn" title="添加附件(支持拖拽)">
