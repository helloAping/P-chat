version: '3'

vars:
  GOPROXY: 'https://goproxy.cn,direct'
  VERSION:
    sh: powershell -NoProfile -Command "(Get-Content VERSION -Raw).Trim()"
  GIT_COMMIT:
    sh: powershell -NoProfile -Command "try { (git rev-parse --short HEAD).Trim() } catch { '' }"

tasks:
  sync:version:
    desc: 读取 VERSION 文件，同步写入 wails.json + install.ps1
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/sync-version.ps1
    silent: false

  build:frontend:
    desc: 编译 Vue 前端 (Vite SPA)，输出到 web/ 并同步到 embed 目录
    deps: [sync:version]
    dir: frontend
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File "..\scripts\clean-frontend-output.ps1"
      - cmd: npm install
        ignore_error: true
      - npm run build
      # Sync MUST run after `npm run build` so it picks up the
      # freshly emitted index.html / assets/. Putting it in
      # build:all's `deps:` list is wrong: Task runs sibling deps
      # in parallel by default, so the sync can race ahead of
      # clean-frontend-output.ps1 and copy an empty tree.
      - powershell -NoProfile -ExecutionPolicy Bypass -File "..\scripts\sync-web.ps1"
      - powershell -NoProfile -ExecutionPolicy Bypass -File "..\scripts\sync-browser-ext.ps1" -OutDir cmd\pchat-server
    # Intentionally no `sources:` / `generates:` — we always
    # rebuild. The user's complaint was that the SPA shipped
    # stale assets because the file-mtime check missed a
    # change (e.g. edits in `node_modules`-adjacent files, or
    # build-generated config that we don't list). Forcing a
    # full rebuild on every `build:all` / `build:dev` adds
    # ~10-15s but guarantees the binary embeds the same code
    # the dev server shows. The clean-frontend-output wipe at
    # the top of this task is the other half of the safety
    # net — without it, content-hashed Vite assets from a
    # previous build pile up in the embed and grow the binary.
    silent: false

  sync:web:
    desc: 同步 web/ 到 cmd/pchat-server/web/（embed 需要真实目录）
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/sync-web.ps1
    silent: false

  build:
    desc: 编译 CLI 和 Server（前端由 build:gui:npm 统一调度）
    deps: [build:frontend]
    cmds:
      - go build -ldflags "-X github.com/p-chat/pchat/internal/version.Version={{.VERSION}} -X github.com/p-chat/pchat/internal/version.GitCommit={{.GIT_COMMIT}}" -o bin/pchat.exe ./cmd/pchat
      - go build -ldflags "-X github.com/p-chat/pchat/internal/version.Version={{.VERSION}} -X github.com/p-chat/pchat/internal/version.GitCommit={{.GIT_COMMIT}}" -o bin/pchat-server.exe ./cmd/pchat-server
      - powershell -NoProfile -Command "Copy-Item -Force cmd\pchat-server\browser-extension.zip bin\browser-extension.zip"
    silent: false

  build:gui:
    desc: 编译桌面端 (Wails v2，跳过 Wails 自带的前端构建——前端已由 build:frontend 生成)
    deps: [build:frontend]
    dir: cmd\pchat-gui
    cmds:
      # wails-build.ps1 locates the wails CLI in the standard
      # GOPATH/bin locations and prepends it to $PATH before
      # invoking `wails build`. We keep the wails call out
      # of the Taskfile because the long PowerShell command
      # with embedded ": " characters broke YAML's plain-
      # scalar parser (see scripts/wails-build.ps1 for the
      # full rationale).
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File "..\..\scripts\wails-build.ps1" -platform "windows/amd64" -ldflags "-X github.com/p-chat/pchat/internal/version.Version={{.VERSION}} -X github.com/p-chat/pchat/internal/version.GitCommit={{.GIT_COMMIT}}"
        env:
          GOPROXY: '{{.GOPROXY}}'
          GOTOOLCHAIN: auto
      - cmd: powershell -NoProfile -Command "Copy-Item -LiteralPath 'build\bin\pchat-gui.exe' -Destination '..\..\bin\pchat-gui.exe' -Force"
    silent: false

  build:gui:linux:
    desc: 编译 Linux 桌面端 (Wails v2)
    deps: [build:frontend]
    dir: cmd\pchat-gui
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File "..\..\scripts\wails-build.ps1" -platform "linux/amd64" -ldflags "-X github.com/p-chat/pchat/internal/version.Version={{.VERSION}} -X github.com/p-chat/pchat/internal/version.GitCommit={{.GIT_COMMIT}}"
        env:
          GOPROXY: '{{.GOPROXY}}'
          GOTOOLCHAIN: auto
    silent: false

  build:server:linux:
    desc: 交叉编译 Linux Server 二进制
    cmds:
      - cmd: go build -ldflags "-X github.com/p-chat/pchat/internal/version.Version={{.VERSION}} -X github.com/p-chat/pchat/internal/version.GitCommit={{.GIT_COMMIT}}" -o bin/pchat-server-linux ./cmd/pchat-server
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
    silent: false

  build:gui:npm:
    desc: 桌面端 — 仅刷新前端依赖（首次构建前需要）
    dir: frontend
    cmds:
      - npm install

  build:setup:
    desc: 构建单文件安装器 bin/pchat-setup-v{version}.exe（依赖 build + build:gui）
    deps: [build, build:gui]
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-installer.ps1
    generates:
      - bin/pchat-setup-v*.exe
    silent: false

  build:all:
    desc: 同时编译 CLI / Server / 桌面端 / 安装器
    cmds:
      - task: build
      - task: build:gui
      - task: build:setup

  package:gui:
    desc: 把桌面端打包到 bin\（含前端 SPA + pchat-server.exe + install/uninstall 脚本）
    cmds:
      - task: build
      - task: build:gui
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package-gui.ps1
    silent: false

  package:gui:linux:
    desc: 打包 Linux 安装包到 build/bin/
    cmds:
      - task: build:frontend
      - task: build:gui:linux
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "Copy-Item -LiteralPath 'bin\pchat-server.exe' -Destination 'build\bin\pchat-server' -Force; if (-not (Test-Path 'build\bin\pchat-server')) { throw 'server binary not found' }"
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Path 'build\bin\web' -Force | Out-Null; Copy-Item -Path 'web\*' -Destination 'build\bin\web\' -Recurse -Force"
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "Copy-Item -LiteralPath 'scripts\install-linux.sh' -Destination 'build\bin\install.sh' -Force; Copy-Item -LiteralPath 'scripts\uninstall-linux.sh' -Destination 'build\bin\uninstall.sh' -Force"
    silent: false

  cli:
    desc: 运行 CLI
    cmds:
      - go run ./cmd/pchat --style tech

  server:
    desc: 运行 HTTP Server
    cmds:
      - go run ./cmd/pchat-server

  gui:
    desc: 启动桌面端 (开发模式)
    dir: cmd\pchat-gui
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File "..\..\scripts\wails-dev.ps1" dev
        env:
          GOPROXY: '{{.GOPROXY}}'
          GOTOOLCHAIN: auto

  build:dev:
    desc: 快速编译并启动 GUI 测试环境（绕过 wails dev，前端内嵌到 pchat-server）
    deps: [build:frontend]
    cmds:
      - powershell -NoProfile -Command "New-Item -ItemType Directory -Path dev-bin -Force | Out-Null"
      - go build -o dev-bin/pchat-server.exe ./cmd/pchat-server
      - go build -o dev-bin/pchat.exe ./cmd/pchat
      - powershell -NoProfile -Command "Copy-Item -Force cmd\pchat-server\browser-extension.zip dev-bin\browser-extension.zip"
      - task: build:dev:gui
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "Get-Process -Name 'pchat-gui' -ErrorAction SilentlyContinue | Stop-Process -Force; Get-Process -Name 'pchat-server' -ErrorAction SilentlyContinue | Stop-Process -Force; Start-Sleep -Milliseconds 500"
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "& '.\dev-bin\pchat-gui.exe'"

  build:dev:gui:
    internal: true
    dir: cmd\pchat-gui
    cmds:
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File "..\..\scripts\wails-dev.ps1" build-debug
        env:
          GOPROXY: '{{.GOPROXY}}'
          GOTOOLCHAIN: auto
      - cmd: powershell -NoProfile -Command "Copy-Item -LiteralPath 'build\bin\pchat-gui.exe' -Destination '..\..\dev-bin\pchat-gui.exe' -Force"

  install:gui:
    desc: 安装桌面端到 %LOCALAPPDATA%\Programs\P-Chat\
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File cmd\pchat-gui\build\bin\install.ps1

  install:gui:linux:
    desc: 安装 Linux 桌面端到 ~/.local/
    cmds:
      - cmd: bash build/bin/install.sh

  uninstall:gui:
    desc: 卸载桌面端
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File cmd\pchat-gui\build\bin\uninstall.ps1

  uninstall:gui:linux:
    desc: 卸载 Linux 桌面端
    cmds:
      - cmd: bash build/bin/uninstall.sh

  install:agents:
    desc: 建立 agent 工具符号链接 (.opencode/.codex/.claude → .agents/AGENTS.md)
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File ".agents\scripts\install.ps1"

  install:agents:force:
    desc: 重新建立 agent 工具符号链接 (覆盖已有)
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File ".agents\scripts\install.ps1" -Force

  install:agents:dryrun:
    desc: 预览 install:agents 会做什么 (不实际修改)
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File ".agents\scripts\install.ps1" -DryRun

  tidy:
    desc: 整理依赖
    cmds:
      - go mod tidy

  fmt:
    desc: 格式化代码
    cmds:
      - gofmt -w .

  vet:
    desc: 静态检查
    cmds:
      - go vet ./...

  test:
    desc: 运行测试
    cmds:
      - go test ./... -v

  test:gui:
    desc: 桌面端单元测试
    dir: cmd\pchat-gui
    cmds:
      - go test -v ./

  smoke:gui:
    desc: 桌面端端到端冒烟 (装 -> 启 -> 后端健康 -> 卸)
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/gui-smoke.ps1

  clean:
    desc: 清理编译产物
    cmds:
      - Remove-Item -Recurse -Force bin -ErrorAction SilentlyContinue
      - Remove-Item -Recurse -Force dev-bin -ErrorAction SilentlyContinue
      - Remove-Item -Recurse -Force cmd\pchat-gui\build\bin -ErrorAction SilentlyContinue
      - Remove-Item -Recurse -Force web\assets -ErrorAction SilentlyContinue

  release:run:
    desc: 本地打 tag 触发 CI Draft Release（交互式，会询问确认）
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts\release.ps1

  release:dryrun:
    desc: 预览 release:run 会做什么（不实际修改）
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts\release.ps1 -DryRun

  package:browser-ext:
    desc: 打包浏览器控制扩展为 ZIP (输出到 bin/browser-extension.zip)
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts\package-browser-ext.ps1
