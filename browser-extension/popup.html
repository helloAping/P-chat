<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>P-Chat 浏览器控制</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 340px;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    color: #e6e6e6;
    background: #1a1a1a;
  }
  h1 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .row label {
    min-width: 64px;
    font-size: 12px;
    color: #888;
  }
  .row .value {
    flex: 1;
    font-size: 12.5px;
    color: #ddd;
    word-break: break-all;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-connected .status-dot { background: #4ade80; }
  .status-disconnected .status-dot { background: #f87171; }
  .status-reconnecting .status-dot { background: #fbbf24; animation: pulse 1s infinite; }
  .status-disabled .status-dot { background: #f87171; }
  .status-unknown .status-dot { background: #666; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  input {
    flex: 1;
    padding: 6px 8px;
    font-size: 12px;
    border: 1px solid #333;
    border-radius: 4px;
    background: #262626;
    color: #e6e6e6;
    outline: none;
  }
  input:focus { border-color: #5b8def; }

  button {
    padding: 6px 12px;
    font-size: 12px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #2d2d2d;
    color: #e6e6e6;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #404040; }
  button.primary {
    background: #3a6ee8;
    border-color: #3a6ee8;
    color: white;
  }
  button.primary:hover { background: #4a7ef8; }

  .actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .divider {
    border-top: 1px solid #333;
    margin: 12px 0;
  }
  .hint {
    font-size: 11px;
    color: #666;
    margin-top: 8px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <h1>P-Chat 浏览器桥接</h1>

  <div class="row status-unknown" id="status-row">
    <label>状态</label>
    <span class="status-dot"></span>
    <span class="value" id="status">检测中…</span>
  </div>

  <div class="row">
    <label>ID</label>
    <span class="value" id="browser-id">—</span>
  </div>

  <div class="divider"></div>

  <div class="row">
    <label>服务器</label>
    <input type="text" id="server-url" placeholder="http://127.0.0.1:8960" value="">
  </div>
  <div class="actions">
    <button id="save-btn" class="primary">保存并连接</button>
    <button id="reconnect-btn">重新连接</button>
    <button id="detect-btn">自动探测</button>
  </div>

  <div class="hint">
    填入 P-Chat 服务器地址（如 <code>http://127.0.0.1:8960</code>），扩展会自动转换为 WebSocket 连接。
    点击「自动探测」可扫描常见端口。
  </div>
  <script src="popup.js"></script>
</body>
</html>
