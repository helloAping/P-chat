name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [windows, linux]
        goarch: [amd64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Sync web to embed dir
        run: |
          mkdir -p cmd/pchat-server/web
          cp -rf web/index.html web/assets cmd/pchat-server/web/

      - name: Build Go binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -o "bin/pchat-server${ext}" ./cmd/pchat-server
          go build -o "bin/pchat${ext}" ./cmd/pchat

      - name: Package archives
        shell: bash
        run: |
          OS=${{ matrix.goos }}
          TAG=${GITHUB_REF#refs/tags/}
          DIST_DIR="dist"

          mkdir -p "${DIST_DIR}/${TAG}-${OS}-amd64"

          # binaries
          if [ "$OS" = "windows" ]; then
            cp bin/pchat.exe "${DIST_DIR}/${TAG}-${OS}-amd64/"
            cp bin/pchat-server.exe "${DIST_DIR}/${TAG}-${OS}-amd64/"
          else
            cp bin/pchat "${DIST_DIR}/${TAG}-${OS}-amd64/"
            cp bin/pchat-server "${DIST_DIR}/${TAG}-${OS}-amd64/"
          fi

          # web assets (shared)
          cp -rf web/ "${DIST_DIR}/${TAG}-${OS}-amd64/web/"

          # archive
          if [ "$OS" = "windows" ]; then
            cd "${DIST_DIR}" && zip -r "${TAG}-${OS}-amd64.zip" "${TAG}-${OS}-amd64"
          else
            cd "${DIST_DIR}" && tar czf "${TAG}-${OS}-amd64.tar.gz" "${TAG}-${OS}-amd64"
          fi

          # rename for upload
          if [ "$OS" = "windows" ]; then
            echo "ARCHIVE=${DIST_DIR}/${TAG}-windows-amd64.zip" >> $GITHUB_ENV
          else
            echo "ARCHIVE=${DIST_DIR}/${TAG}-linux-amd64.tar.gz" >> $GITHUB_ENV
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
