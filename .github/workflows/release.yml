name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - feat_更新
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install tools
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: task build:all
        run: task build:all

      - name: Build Linux binaries
        run: |
          $tag = if ($env:GITHUB_REF -match 'refs/tags/(.+)') { $matches[1] } else { 'test' }
          mkdir "bin/$tag-linux" -Force

          $env:GOOS = "linux"; $env:GOARCH = "amd64"
          go build -o "bin/$tag-linux/pchat" ./cmd/pchat
          go build -o "bin/$tag-linux/pchat-server" ./cmd/pchat-server

          Copy-Item -Recurse "web/" "bin/$tag-linux/web/"
          cd bin; tar czf "../$tag-linux-amd64.tar.gz" "$tag-linux"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/pchat-setup-v*.exe
            *-linux-amd64.tar.gz
          generate_release_notes: false
