name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build pchat
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o dist/pchat${{ matrix.ext }} ./cmd/pchat

      - name: Build pchat-server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags "-s -w" -o dist/pchat-server${{ matrix.ext }} ./cmd/pchat-server

      - name: Package
        working-directory: dist
        run: |
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf pchat-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
              pchat${{ matrix.ext }} pchat-server${{ matrix.ext }}
          else
            zip pchat-${{ matrix.goos }}-${{ matrix.goarch }}.zip \
              pchat${{ matrix.ext }} pchat-server${{ matrix.ext }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pchat-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/pchat-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
