name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Sync web to embed dir
        run: |
          mkdir -p cmd/pchat-server/web
          cp -rf web/index.html web/assets cmd/pchat-server/web/

      - name: Build Go binaries (cross-compile)
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          # Windows
          GOOS=windows GOARCH=amd64 go build -o "bin/${TAG}/pchat.exe" ./cmd/pchat
          GOOS=windows GOARCH=amd64 go build -o "bin/${TAG}/pchat-server.exe" ./cmd/pchat-server
          cp -rf web/ "bin/${TAG}/web/"
          cd bin && zip -r "../${TAG}-windows-amd64.zip" "${TAG}" && cd ..

          # Linux
          rm -f "bin/${TAG}/pchat.exe" "bin/${TAG}/pchat-server.exe" || true
          GOOS=linux GOARCH=amd64 go build -o "bin/${TAG}/pchat" ./cmd/pchat
          GOOS=linux GOARCH=amd64 go build -o "bin/${TAG}/pchat-server" ./cmd/pchat-server
          cd bin && tar czf "../${TAG}-linux-amd64.tar.gz" "${TAG}" && cd ..

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *-windows-amd64.zip
            *-linux-amd64.tar.gz
