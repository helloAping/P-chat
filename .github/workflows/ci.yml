name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd cmd/pchat-gui/frontend
          npm ci
          npm run build

      - name: Sync web to embed dir
        run: |
          mkdir -p cmd/pchat-server/web
          cp -rf web/index.html web/assets cmd/pchat-server/web/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -count=1 -timeout 120s

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd cmd/pchat-gui/frontend
          npm ci
          npm run build

      - name: Sync web to embed dir
        run: |
          mkdir -p cmd/pchat-server/web
          cp -rf web/index.html web/assets cmd/pchat-server/web/

      - name: Build
        run: |
          go build -o bin/pchat-server ./cmd/pchat-server
          go build -o bin/pchat ./cmd/pchat
